interface:
  display_name: "ServiceNow Development"
  short_description: "Build and debug ServiceNow safely"
  default_prompt: "Use $servicenow-pdi to select the intended instance profile, inspect live evidence, choose the smallest OOTB-first implementation, and verify behavior, transport, and rollback."

dependencies:
  tools:
    - type: "mcp"
      value: "servicenow-pdi"
      description: "Required multi-instance ServiceNow MCP tools for profile discovery, health, narrow reads, schema inspection, and guarded writes"
      transport: "streamable_http"
      url: "https://servicenow-pdi.netlify.app/mcp"

policy:
  allow_implicit_invocation: true
